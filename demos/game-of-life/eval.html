<!doctype html>
<!-- eval harness: deterministic render for screenshot goldens.
     seeded PRNG + fixed tick count + single synchronous render (no rAF)
     -> stable pixels for evalshot SSIM. Serve over http (ES modules). -->
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;background:#0a0f14}canvas{display:block}</style>
</head>
<body>
<canvas id="c" width="480" height="640"></canvas>
<script type="module">
import { createApp, tick } from "./src/animation-app/app.js";
import { render } from "./src/canvas-renderer/renderer.js";

// mulberry32 — seeded PRNG, deterministic soup
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const CELL = 8;                       // 60x80 grid -> 480x640 canvas, exact viewport
const T = +(new URLSearchParams(location.search).get("t") || 40);  // ?t=N ticks
const app = createApp(60, 80, mulberry32(42));
for (let i = 0; i < T; i++) tick(app);    // evolved state, age fades populated
const ctx = document.getElementById("c").getContext("2d");
render(ctx, app.grid, app.ages, CELL);
document.title = "eval-ready";        // settle marker
</script>
</body>
</html>
